<!DOCTYPE html>

<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Menú de Componentes</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/fuse.js/dist/fuse.min.js"></script>
    <link rel="stylesheet" href="../css/main.css">

</head>

<body>



    <div class="carousel-container">

        <h1 id="category-title">Selecciona un componente</h1>



       <div class="carousel" id="carousel">
            
            <div class="card" data-name="Login">
                <div class="card-icon"><i class="fa-solid fa-shield-halved"></i></div>
                <div class="card-title">Login</div>
            </div>

            <div class="card" data-name="Botones">
                <div class="card-icon"><i class="fa-solid fa-layer-group"></i></div>
                <div class="card-title">Botones</div>
            </div>

            <div class="card" data-name="Sliders">
                <div class="card-icon"><i class="fa-solid fa-sliders"></i></div>
                <div class="card-title">Sliders</div>
            </div>

            <div class="card" data-name="toggles">
                <div class="card-icon"><i class="fa-solid fa-circle-half-stroke"></i></div>
                <div class="card-title">Theme Toggle</div>
            </div>

            <div class="card" data-name="Navbars">
                <div class="card-icon"><i class="fa-solid fa-compass"></i></div>
                <div class="card-title">Navbar</div>
            </div>

            <div class="card" data-name="Relojes">
                <div class="card-icon"><i class="fa-solid fa-stopwatch"></i></div>
                <div class="card-title">Clock</div>
            </div>

            <div class="card" data-name="Animaciones">
                <div class="card-icon"><i class="fa-solid fa-wand-magic-sparkles"></i></div>
                <div class="card-title">Animaciones</div>
            </div>

            <div class="card" data-name="sidebars">
                <div class="card-icon"><i class="fa-solid fa-bars-staggered"></i></div>
                <div class="card-title">Sidebars</div>
            </div>

        </div>

       

        <p class="controls-hint">Usa las flechas ⬅ ➡, la rueda del ratón o haz clic para navegar</p>

    </div>



    <script type="module" src="../js/app.js"></script>
    <div id="app" style="display:none"></div>

</body>

</html>
